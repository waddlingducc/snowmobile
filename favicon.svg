<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#1e3a8a"/>
  <g fill="white">
    <!-- Track: long oval at the bottom -->
    <rect x="20" y="130" width="142" height="22" rx="11"/>

    <!--
      Body silhouette — sled faces LEFT (ski on left, rear on right).
      The front HOOD arches up high on the left side,
      the SEAT area is lower and flat toward the right,
      then the rear drops back down.

      Points (clockwise):
        Front-bottom  → (32, 130)  [base of the front, sits on the track]
        Front-nose    → (32, 108)  [nose tip, rises before hood]
        Hood peak     → (62,  44)  [tallest point — the cowl]
        Hood back     → (96,  50)  [back of hood, slight dip]
        Seat-rear     → (152, 68)  [rear top, seat level]
        Rear-bottom   → (163, 108) [tail drops to track level]
        Back to track → (163, 130)
    -->
    <path d="
      M 32 130
      L 32 108
      Q 42  72  62  44
      Q 82  30 100  50
      L 152  68
      L 163 108
      L 163 130
      Z
    "/>

    <!--
      Front ski: thin parallelogram extending forward-left from the nose.
      Angled slightly downward (skis touch the snow).
        Top-left  (5, 136)
        Top-right (34, 128)
        Bot-right (42, 142)
        Bot-left  (10, 148)
    -->
    <path d="M 5 136 L 34 128 L 43 142 L 10 148 Z"/>
  </g>
</svg>
